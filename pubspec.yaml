name: ecoruta1
description: "EcoRuta — Reciclaje Colaborativo. MVP v1.0 (ISW-411, UAPA 2026)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Gestión de estado (BLoC)
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Programación funcional (Either para manejo de errores)
  dartz: ^0.10.1

  # Inyección de dependencias
  get_it: ^8.0.3

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  firebase_messaging: ^15.1.5

  # Autenticación con Google
  google_sign_in: ^6.2.2

  # Mapas y geolocalización
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2

  # Multimedia
  image_picker: ^1.1.2

  # Utilidades
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
